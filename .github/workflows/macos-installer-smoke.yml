name: macOS Installer Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - "actions/**"
    paths:
      - ".github/workflows/macos-installer-smoke.yml"
      - "Codex-Mac-一键安装包/**"
      - "script-modules/**"

jobs:
  macos-smoke:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntax check
        shell: bash
        run: |
          bash -n "Codex-Mac-一键安装包/install-codex-cli-mac.sh"
          bash -n "Codex-Mac-一键安装包/setup_no_proxy_mac.sh"

      - name: Dry run
        shell: bash
        run: |
          cd "Codex-Mac-一键安装包"
          bash install-codex-cli-mac.sh --dry-run --verbose

      - name: Inspect Homebrew node@24
        shell: bash
        run: |
          brew --prefix node@24 || true
          node24_prefix="$(brew --prefix node@24 2>/dev/null || true)"
          if [ -n "$node24_prefix" ]; then
            ls -la "$node24_prefix" || true
            ls -la "$node24_prefix/bin" || true
          fi

      - name: Install without CRS prompt
        shell: bash
        run: |
          cd "Codex-Mac-一键安装包"
          bash install-codex-cli-mac.sh --verbose --skip-crs-config

      - name: Verify commands
        shell: bash
        run: |
          source ~/.bash_profile 2>/dev/null || true
          source ~/.bashrc 2>/dev/null || true
          node -v
          npm -v
          codex --version
          which node
          which npm
          which codex
          echo "NO_PROXY=${NO_PROXY:-}"
