name: macOS Installer Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - CRS2.0
      - "actions/**"
    paths:
      - ".github/workflows/macos-installer-smoke.yml"
      - "Codex-Mac-一键安装包/**"
      - "script-modules/**"

jobs:
  macos-smoke:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntax check
        shell: bash
        run: |
          bash -n "Codex-Mac-一键安装包/install-codex-cli-mac.sh"
          bash -n "Codex-Mac-一键安装包/setup_no_proxy_mac.sh"

      - name: Dry run
        shell: bash
        run: |
          cd "Codex-Mac-一键安装包"
          bash install-codex-cli-mac.sh --dry-run --verbose

      - name: Preinstall Homebrew node@24 for smoke
        shell: bash
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
          NONINTERACTIVE: "1"
        run: |
          set -euo pipefail
          brew unlink node@22 >/dev/null 2>&1 || true
          brew install node@24
          node24_prefix="$(brew --prefix node@24)"
          brew link --overwrite node@24 >/dev/null 2>&1 || true
          printf '%s\n' "$node24_prefix/bin" >> "$GITHUB_PATH"
          "$node24_prefix/bin/node" -v
          "$node24_prefix/bin/npm" -v

      - name: Install with mocked CRS 2.0 endpoint
        shell: bash
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
          NONINTERACTIVE: "1"
          CODEX_CRS_BASE_URL: "http://127.0.0.1:18080/api"
          CODEX_CRS_OPENAI_API_KEY: "crs2-smoke-token"
        run: |
          set -euo pipefail
          cd "Codex-Mac-一键安装包"
          # The installer probes <base_url>/responses. We intentionally feed /api
          # first and let the installer auto-correct it to /openai so the CRS2.0
          # route-detection logic is covered in smoke.
          python3 - <<'PY' >"$RUNNER_TEMP/mock-crs.log" 2>&1 &
          from http.server import BaseHTTPRequestHandler, HTTPServer


          class Handler(BaseHTTPRequestHandler):
              def do_POST(self):
                  if self.path == "/openai/responses":
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(b'{"id":"smoke-response","object":"response"}')
                      return

                  self.send_response(404)
                  self.send_header("Content-Type", "application/json")
                  self.end_headers()
                  self.wfile.write(b'{"error":"not found"}')

              def log_message(self, format, *args):
                  return


          HTTPServer(("127.0.0.1", 18080), Handler).serve_forever()
          PY
          server_pid=$!
          cleanup() {
            status=$?
            if [[ $status -ne 0 ]]; then
              echo "::group::mock-crs.log"
              cat "$RUNNER_TEMP/mock-crs.log" || true
              echo "::endgroup::"
            fi
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          status=""
          for attempt in {1..20}; do
            status="$(
              curl -sS -o /dev/null -w '%{http_code}' \
                --max-time 5 \
                -X POST \
                -H 'Content-Type: application/json' \
                --data '{}' \
                'http://127.0.0.1:18080/openai/responses' || true
            )"
            if [[ "$status" == "200" ]]; then
              break
            fi
            sleep 1
          done
          test "$status" = "200"

          bash install-codex-cli-mac.sh --verbose --skip-crs-config --skip-no-proxy

      - name: Apply CRS 2.0 config only
        shell: bash
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
          NONINTERACTIVE: "1"
          CODEX_CRS_BASE_URL: "http://127.0.0.1:18080/api"
          CODEX_CRS_OPENAI_API_KEY: "crs2-smoke-token"
        run: |
          set -euo pipefail
          cd "Codex-Mac-一键安装包"
          python3 - <<'PY' >"$RUNNER_TEMP/mock-crs-config.log" 2>&1 &
          from http.server import BaseHTTPRequestHandler, HTTPServer


          class Handler(BaseHTTPRequestHandler):
              def do_POST(self):
                  if self.path == "/openai/responses":
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(b'{"id":"smoke-response","object":"response"}')
                      return

                  self.send_response(404)
                  self.send_header("Content-Type", "application/json")
                  self.end_headers()
                  self.wfile.write(b'{"error":"not found"}')

              def log_message(self, format, *args):
                  return


          HTTPServer(("127.0.0.1", 18080), Handler).serve_forever()
          PY
          server_pid=$!
          cleanup() {
            status=$?
            if [[ $status -ne 0 ]]; then
              echo "::group::mock-crs-config.log"
              cat "$RUNNER_TEMP/mock-crs-config.log" || true
              echo "::endgroup::"
            fi
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          status=""
          for attempt in {1..20}; do
            status="$(
              curl -sS -o /dev/null -w '%{http_code}' \
                --max-time 5 \
                -X POST \
                -H 'Content-Type: application/json' \
                --data '{}' \
                'http://127.0.0.1:18080/openai/responses' || true
            )"
            if [[ "$status" == "200" ]]; then
              break
            fi
            sleep 1
          done
          test "$status" = "200"

          log_file="$RUNNER_TEMP/apply-crs-config.log"
          echo "CODEX_CRS_BASE_URL=${CODEX_CRS_BASE_URL:+set}"
          echo "CODEX_CRS_OPENAI_API_KEY=${CODEX_CRS_OPENAI_API_KEY:+set}"
          if ! CODEX_CRS_BASE_URL="$CODEX_CRS_BASE_URL" \
               CODEX_CRS_OPENAI_API_KEY="$CODEX_CRS_OPENAI_API_KEY" \
               bash -x install-codex-cli-mac.sh --verbose --skip-no-proxy >"$log_file" 2>&1; then
            echo "::group::apply-crs-config.log"
            cat "$log_file" || true
            echo "::endgroup::"
            python3 - "$log_file" <<'PY'
            import sys
            from pathlib import Path

            path = Path(sys.argv[1])
            try:
                lines = path.read_text(encoding="utf-8", errors="replace").splitlines()
            except FileNotFoundError:
                lines = ["log file missing"]

            if not lines:
                lines = ["log file is empty"]

            for line in reversed(lines[-12:]):
                print(f"::error::{line}")
            PY
            exit 1
          fi

          codex_home_path="$(
            python3 - <<'PY'
            from pathlib import Path

            candidates = [Path.home() / ".codex"]
            candidates.extend(sorted(Path("/Users/Shared").glob("Codex-*/.codex")))

            for candidate in candidates:
                if (candidate / "config.toml").is_file() and (candidate / "auth.json").is_file():
                    print(candidate)
                    break
            PY
          )"
          if [[ -z "$codex_home_path" ]]; then
            echo "::error::Unable to locate CRS artifact directory after config step."
            find "$HOME" /Users/Shared -maxdepth 4 \( -name config.toml -o -name auth.json \) 2>/dev/null || true
            exit 1
          fi
          printf '%s\n' "$codex_home_path" > "$GITHUB_WORKSPACE/.codex-smoke-home"
          echo "CODEX_SMOKE_HOME=$codex_home_path" >> "$GITHUB_ENV"
          echo "Resolved smoke CODEX_HOME=$codex_home_path"

      - name: Apply NO_PROXY only
        shell: bash
        run: |
          set -euo pipefail
          cd "Codex-Mac-一键安装包"
          log_file="$RUNNER_TEMP/apply-no-proxy.log"
          if ! bash setup_no_proxy_mac.sh >"$log_file" 2>&1; then
            echo "::group::apply-no-proxy.log"
            cat "$log_file" || true
            echo "::endgroup::"
            tail -n 20 "$log_file" | sed 's/^/::error::/' || true
            exit 1
          fi

      - name: Verify CRS 2.0 artifacts
        shell: bash
        run: |
          set -euo pipefail
          verify_script="$RUNNER_TEMP/verify-crs-artifacts.sh"
          cat >"$verify_script" <<'BASH'
          set -euo pipefail

          require_eq() {
            local expected="$1"
            local actual="$2"
            local label="$3"
            if [[ "$actual" != "$expected" ]]; then
              echo "::error::$label expected [$expected] but got [$actual]"
              exit 1
            fi
          }

          require_file_contains() {
            local pattern="$1"
            local file="$2"
            local label="$3"
            if ! grep -F "$pattern" "$file"; then
              echo "::error::$label missing pattern [$pattern] in $file"
              exit 1
            fi
          }

          codex_home="${CODEX_SMOKE_HOME:-}"
          if [[ -z "$codex_home" && -f "$GITHUB_WORKSPACE/.codex-smoke-home" ]]; then
            codex_home="$(tr -d '\r' < "$GITHUB_WORKSPACE/.codex-smoke-home")"
            echo "Recovered CODEX_HOME from workspace marker: $codex_home"
          fi
          if [[ -z "$codex_home" ]]; then
            codex_home="$(python3 -c 'from pathlib import Path; candidates=[Path.home()/".codex", *sorted(Path("/Users/Shared").glob("Codex-*/.codex"))]; print(next((str(candidate) for candidate in candidates if (candidate/"config.toml").is_file() and (candidate/"auth.json").is_file()), ""))')"
            if [[ -n "$codex_home" ]]; then
              echo "Rediscovered CODEX_HOME during verify: $codex_home"
            fi
          fi
          if [[ -z "$codex_home" ]]; then
            echo "::error::CODEX_SMOKE_HOME is empty before verify."
            ls -la "$HOME" || true
            ls -la "$GITHUB_WORKSPACE" || true
            ls -la /Users/Shared || true
            find "$HOME" /Users/Shared -maxdepth 4 \( -name config.toml -o -name auth.json \) 2>/dev/null || true
            exit 1
          fi
          config_path="$codex_home/config.toml"
          auth_path="$codex_home/auth.json"
          echo "Resolved CODEX_HOME=${codex_home}"
          test -f "$config_path" || { echo "::error::missing config file: $config_path"; exit 1; }
          test -f "$auth_path" || { echo "::error::missing auth file: $auth_path"; exit 1; }
          require_file_contains 'model_provider = "OpenAI"' "$config_path" "config model_provider"
          require_file_contains 'disable_response_storage = true' "$config_path" "config disable_response_storage"
          require_file_contains 'base_url = "http://127.0.0.1:18080/openai"' "$config_path" "config base_url"
          require_file_contains 'wire_api = "responses"' "$config_path" "config wire_api"
          require_file_contains 'requires_openai_auth = true' "$config_path" "config requires_openai_auth"
          auth_token="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("OPENAI_API_KEY", ""))' "$auth_path")"
          require_eq "crs2-smoke-token" "$auth_token" "auth OPENAI_API_KEY"
          printf '%s\n' "$codex_home" > "$RUNNER_TEMP/codex-home-path.txt"
          printf '%s\n' "$config_path" > "$RUNNER_TEMP/codex-config-path.txt"
          printf '%s\n' "$auth_path" > "$RUNNER_TEMP/codex-auth-path.txt"
          echo "CRS artifact verification passed."
          BASH

          verify_log="$RUNNER_TEMP/verify-crs-artifacts.log"
          if ! bash "$verify_script" >"$verify_log" 2>&1; then
            echo "::group::verify-crs-artifacts.log"
            cat "$verify_log" || true
            echo "::endgroup::"
            python3 - "$verify_log" <<'PY'
            import sys
            from pathlib import Path

            path = Path(sys.argv[1])
            try:
                lines = path.read_text(encoding="utf-8", errors="replace").splitlines()
            except FileNotFoundError:
                lines = ["verify log missing"]

            if not lines:
                lines = ["verify log is empty"]

            for line in lines[-40:]:
                print(f"::error::{line}")
            PY
            exit 1
          fi

          cat "$verify_log"

      - name: Build managed shell env
        shell: bash
        run: |
          set -euo pipefail
          require_eq() {
            local expected="$1"
            local actual="$2"
            local label="$3"
            if [[ "$actual" != "$expected" ]]; then
              echo "::error::$label expected [$expected] but got [$actual]"
              exit 1
            fi
          }

          require_nonempty() {
            local actual="$1"
            local label="$2"
            if [[ -z "$actual" ]]; then
              echo "::error::$label is empty"
              exit 1
            fi
          }

          managed_env="$RUNNER_TEMP/codex-managed-env.sh"
          : > "$managed_env"
          found_node_path_block=0
          found_no_proxy_block=0
          codex_home="$(tr -d '\r' < "$RUNNER_TEMP/codex-home-path.txt")"

          append_managed_block() {
            local file="$1"
            local start="$2"
            local end="$3"
            [[ -f "$file" ]] || return 0
            awk -v start="$start" -v end="$end" '
              index($0, start) { capture=1; next }
              index($0, end) { capture=0; next }
              capture { print }
            ' "$file" >> "$managed_env"
          }

          for rc_file in "$HOME/.zprofile" "$HOME/.zshrc" "$HOME/.bash_profile" "$HOME/.bashrc"; do
            if [[ -f "$rc_file" ]] && grep -Fq '# >>> codex homebrew node path >>>' "$rc_file"; then
              append_managed_block "$rc_file" '# >>> codex homebrew node path >>>' '# <<< codex homebrew node path <<<'
              found_node_path_block=1
            fi
            if [[ -f "$rc_file" ]] && grep -Fq '# >>> codex no_proxy >>>' "$rc_file"; then
              append_managed_block "$rc_file" '# >>> codex no_proxy >>>' '# <<< codex no_proxy <<<'
              found_no_proxy_block=1
            fi
          done

          if [[ "$codex_home" != "$HOME/.codex" ]]; then
            printf 'export CODEX_HOME=%q\n' "$codex_home" >> "$managed_env"
          fi

          require_eq "1" "$found_node_path_block" "managed node PATH block found"
          require_eq "1" "$found_no_proxy_block" "managed NO_PROXY block found"
          require_nonempty "$(cat "$managed_env")" "managed smoke env script"
          echo "::group::managed-env.sh"
          cat "$managed_env"
          echo "::endgroup::"

      - name: Verify managed node and codex shell
        shell: bash
        run: |
          set -euo pipefail
          verify_script="$RUNNER_TEMP/verify-managed-shell.sh"
          cat >"$verify_script" <<'BASH'
          set -euo pipefail

          require_eq() {
            local expected="$1"
            local actual="$2"
            local label="$3"
            if [[ "$actual" != "$expected" ]]; then
              echo "::error::$label expected [$expected] but got [$actual]"
              exit 1
            fi
          }

          require_nonempty() {
            local actual="$1"
            local label="$2"
            if [[ -z "$actual" ]]; then
              echo "::error::$label is empty"
              exit 1
            fi
          }

          source "$MANAGED_ENV"

          echo "PATH after managed env: $PATH"
          echo "NO_PROXY after managed env: ${NO_PROXY:-}"
          echo "no_proxy after managed env: ${no_proxy:-}"

          node_path="$(command -v node || true)"
          npm_path="$(command -v npm || true)"
          codex_path="$(command -v codex || true)"
          require_nonempty "$node_path" "command -v node"
          require_nonempty "$npm_path" "command -v npm"
          require_nonempty "$codex_path" "command -v codex"

          node_version="$(node -v 2>&1)" || { echo "::error::node -v failed"; exit 1; }
          npm_version="$(npm -v 2>&1)" || { echo "::error::npm -v failed"; exit 1; }
          codex_version="$(codex --version 2>&1)" || { echo "::error::codex --version failed"; exit 1; }
          echo "$node_version"
          echo "$npm_version"
          echo "$codex_version"
          echo "$node_path"
          echo "$npm_path"
          echo "$codex_path"

          require_eq "$NODE24_PREFIX/bin/node" "$node_path" "which node"
          require_eq "$NODE24_PREFIX/bin/npm" "$npm_path" "which npm"
          require_eq "$NODE24_PREFIX/bin/codex" "$codex_path" "which codex"
          node_major="$(node -p 'process.versions.node.split(".")[0]' 2>/dev/null || true)"
          require_eq "24" "$node_major" "node major version"
          node24_path_count="$(printf '%s' "$PATH" | tr ':' '\n' | awk -v target="$NODE24_PREFIX/bin" '$0 == target { count++ } END { print count + 0 }')"
          require_eq "1" "$node24_path_count" "node24 PATH entry count"
          if [[ "$EXPECTED_CODEX_HOME" != "$HOME/.codex" ]]; then
            require_eq "$EXPECTED_CODEX_HOME" "${CODEX_HOME:-}" "managed CODEX_HOME"
          fi
          echo "Managed node/codex shell verification passed."
          BASH

          verify_log="$RUNNER_TEMP/verify-managed-shell.log"
          if ! NODE24_PREFIX="$node24_prefix" \
               EXPECTED_CODEX_HOME="$(tr -d '\r' < "$RUNNER_TEMP/codex-home-path.txt")" \
               MANAGED_ENV="$managed_env" \
               bash --noprofile --norc "$verify_script" >"$verify_log" 2>&1; then
            echo "::group::verify-managed-shell.log"
            cat "$verify_log" || true
            echo "::endgroup::"
            python3 - "$verify_log" <<'PY'
            import sys
            from pathlib import Path

            path = Path(sys.argv[1])
            try:
                lines = path.read_text(encoding="utf-8", errors="replace").splitlines()
            except FileNotFoundError:
                lines = ["verify log missing"]

            if not lines:
                lines = ["verify log is empty"]

            for line in lines[-40:]:
                print(f"::error::{line}")
            PY
            exit 1
          fi

          cat "$verify_log"

      - name: Verify managed NO_PROXY shell
        shell: bash
        run: |
          set -euo pipefail
          verify_script="$RUNNER_TEMP/verify-managed-no-proxy.sh"
          cat >"$verify_script" <<'BASH'
          set -euo pipefail

          require_eq() {
            local expected="$1"
            local actual="$2"
            local label="$3"
            if [[ "$actual" != "$expected" ]]; then
              echo "::error::$label expected [$expected] but got [$actual]"
              exit 1
            fi
          }

          source "$MANAGED_ENV"

          echo "NO_PROXY after managed env: ${NO_PROXY:-}"
          echo "no_proxy after managed env: ${no_proxy:-}"
          require_eq "${NO_PROXY:-}" "${no_proxy:-}" "NO_PROXY parity"
          printf '%s' "${NO_PROXY:-}" | tr ',' '\n' | grep -Fx 'localhost' >/dev/null || { echo "::error::NO_PROXY missing localhost"; exit 1; }
          printf '%s' "${NO_PROXY:-}" | tr ',' '\n' | grep -Fx '127.0.0.1' >/dev/null || { echo "::error::NO_PROXY missing 127.0.0.1"; exit 1; }
          printf '%s' "${NO_PROXY:-}" | tr ',' '\n' | grep -Fx '127.0.0.1:18080' >/dev/null || { echo "::error::NO_PROXY missing 127.0.0.1:18080"; exit 1; }
          if printf '%s' "${NO_PROXY:-}" | tr ',' '\n' | grep -Fx '3.27.43.117' >/dev/null; then
            echo "::error::NO_PROXY still contains legacy host 3.27.43.117"
            exit 1
          fi
          if printf '%s' "${NO_PROXY:-}" | tr ',' '\n' | grep -Fx '3.27.43.117:10086' >/dev/null; then
            echo "::error::NO_PROXY still contains legacy host:port 3.27.43.117:10086"
            exit 1
          fi
          echo "Managed NO_PROXY shell verification passed."
          BASH

          verify_log="$RUNNER_TEMP/verify-managed-no-proxy.log"
          if ! MANAGED_ENV="$RUNNER_TEMP/codex-managed-env.sh" \
               bash --noprofile --norc "$verify_script" >"$verify_log" 2>&1; then
            echo "::group::verify-managed-no-proxy.log"
            cat "$verify_log" || true
            echo "::endgroup::"
            python3 - "$verify_log" <<'PY'
            import sys
            from pathlib import Path

            path = Path(sys.argv[1])
            try:
                lines = path.read_text(encoding="utf-8", errors="replace").splitlines()
            except FileNotFoundError:
                lines = ["verify log missing"]

            if not lines:
                lines = ["verify log is empty"]

            for line in lines[-40:]:
                print(f"::error::{line}")
            PY
            exit 1
          fi

          cat "$verify_log"
