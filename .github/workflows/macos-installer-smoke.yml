name: macOS Installer Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - CRS2.0
      - "actions/**"
    paths:
      - ".github/workflows/macos-installer-smoke.yml"
      - "Codex-Mac-一键安装包/**"
      - "script-modules/**"

jobs:
  macos-smoke:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntax check
        shell: bash
        run: |
          bash -n "Codex-Mac-一键安装包/install-codex-cli-mac.sh"
          bash -n "Codex-Mac-一键安装包/setup_no_proxy_mac.sh"

      - name: Dry run
        shell: bash
        run: |
          cd "Codex-Mac-一键安装包"
          bash install-codex-cli-mac.sh --dry-run --verbose

      - name: Preinstall Homebrew node@24 for smoke
        shell: bash
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
          NONINTERACTIVE: "1"
        run: |
          set -euo pipefail
          brew unlink node@22 >/dev/null 2>&1 || true
          brew install node@24
          node24_prefix="$(brew --prefix node@24)"
          brew link --overwrite node@24 >/dev/null 2>&1 || true
          printf '%s\n' "$node24_prefix/bin" >> "$GITHUB_PATH"
          "$node24_prefix/bin/node" -v
          "$node24_prefix/bin/npm" -v

      - name: Install with mocked CRS 2.0 endpoint
        shell: bash
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
          NONINTERACTIVE: "1"
          CODEX_CRS_BASE_URL: "http://127.0.0.1:18080/api"
          CODEX_CRS_OPENAI_API_KEY: "crs2-smoke-token"
        run: |
          set -euo pipefail
          cd "Codex-Mac-一键安装包"
          # The installer probes <base_url>/responses. We intentionally feed /api
          # first and let the installer auto-correct it to /openai so the CRS2.0
          # route-detection logic is covered in smoke.
          python3 - <<'PY' >"$RUNNER_TEMP/mock-crs.log" 2>&1 &
          from http.server import BaseHTTPRequestHandler, HTTPServer


          class Handler(BaseHTTPRequestHandler):
              def do_POST(self):
                  if self.path == "/openai/responses":
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(b'{"id":"smoke-response","object":"response"}')
                      return

                  self.send_response(404)
                  self.send_header("Content-Type", "application/json")
                  self.end_headers()
                  self.wfile.write(b'{"error":"not found"}')

              def log_message(self, format, *args):
                  return


          HTTPServer(("127.0.0.1", 18080), Handler).serve_forever()
          PY
          server_pid=$!
          cleanup() {
            status=$?
            if [[ $status -ne 0 ]]; then
              echo "::group::mock-crs.log"
              cat "$RUNNER_TEMP/mock-crs.log" || true
              echo "::endgroup::"
            fi
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          status=""
          for attempt in {1..20}; do
            status="$(
              curl -sS -o /dev/null -w '%{http_code}' \
                --max-time 5 \
                -X POST \
                -H 'Content-Type: application/json' \
                --data '{}' \
                'http://127.0.0.1:18080/openai/responses' || true
            )"
            if [[ "$status" == "200" ]]; then
              break
            fi
            sleep 1
          done
          test "$status" = "200"

          bash install-codex-cli-mac.sh --verbose --skip-crs-config --skip-no-proxy

      - name: Apply CRS 2.0 config only
        shell: bash
        env:
          CODEX_CRS_BASE_URL: "http://127.0.0.1:18080/api"
          CODEX_CRS_OPENAI_API_KEY: "crs2-smoke-token"
        run: |
          set -euo pipefail
          cd "Codex-Mac-一键安装包"
          bash install-codex-cli-mac.sh --verbose --skip-no-proxy

      - name: Verify commands and CRS 2.0 artifacts
        shell: bash
        run: |
          set -euo pipefail
          source ~/.zprofile 2>/dev/null || true
          source ~/.zshrc 2>/dev/null || true
          source ~/.bash_profile 2>/dev/null || true
          source ~/.bashrc 2>/dev/null || true
          node24_prefix="$(brew --prefix node@24)"
          config_path="${CODEX_HOME:-$HOME/.codex}/config.toml"
          auth_path="${CODEX_HOME:-$HOME/.codex}/auth.json"
          node -v
          npm -v
          codex --version
          which node
          which npm
          which codex
          test "$(which node)" = "$node24_prefix/bin/node"
          test "$(which npm)" = "$node24_prefix/bin/npm"
          test "$(which codex)" = "$node24_prefix/bin/codex"
          node -p 'process.versions.node.split(".")[0]' | grep -qx '24'
          test "$(printf '%s' "$PATH" | tr ':' '\n' | grep -Fx "$node24_prefix/bin" | wc -l | tr -d ' ')" = "1"
          test -f "$config_path"
          test -f "$auth_path"
          grep -F 'model_provider = "OpenAI"' "$config_path"
          grep -F 'disable_response_storage = true' "$config_path"
          grep -F 'base_url = "http://127.0.0.1:18080/openai"' "$config_path"
          grep -F 'wire_api = "responses"' "$config_path"
          grep -F 'requires_openai_auth = true' "$config_path"
          python3 - "$auth_path" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as fh:
              auth = json.load(fh)

          assert auth["OPENAI_API_KEY"] == "crs2-smoke-token", auth
          PY
          test "${NO_PROXY:-}" = "${no_proxy:-}"
          printf '%s' "${NO_PROXY:-}" | tr ',' '\n' | grep -Fx 'localhost'
          printf '%s' "${NO_PROXY:-}" | tr ',' '\n' | grep -Fx '127.0.0.1'
          printf '%s' "${NO_PROXY:-}" | tr ',' '\n' | grep -Fx '127.0.0.1:18080'
          ! printf '%s' "${NO_PROXY:-}" | tr ',' '\n' | grep -Fx '3.27.43.117'
          ! printf '%s' "${NO_PROXY:-}" | tr ',' '\n' | grep -Fx '3.27.43.117:10086'
          echo "NO_PROXY=${NO_PROXY:-}"
